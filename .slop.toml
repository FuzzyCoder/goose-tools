# slop — agentic code quality linter
# https://github.com/JordanGunn/agent-slop-lint
# Profile: default

# Root directory (default: ".")
root = "."

# Languages to analyze (default: auto-detect all supported)
# Supported: python, javascript, typescript, go, rust, java, c_sharp
# languages = ["python", "typescript"]

# Global file exclusions (applied to all rules)
exclude = []

[rules.complexity]
enabled = true
cyclomatic_threshold = 10       # fail if any function CCX exceeds this
cognitive_threshold = 15        # fail if any function CogC exceeds this
weighted_threshold = 40         # fail if any class WMC exceeds this
severity = "error"

[rules.halstead]
enabled = true
volume_threshold = 1500         # fail if any function V exceeds this
difficulty_threshold = 30        # fail if any function D exceeds this
severity = "error"

[rules.npath]
enabled = true
npath_threshold = 400         # fail if any function NPath exceeds this
severity = "error"

[rules.hotspots]
enabled = true
since = "14 days ago"
min_commits = 2
fail_on_quadrant = ["hotspot"]
severity = "error"

[rules.packages]
enabled = true
# languages = ["python"]        # optional: restrict to a subset of slop's supported languages
max_distance = 0.7
fail_on_zone = ["pain"]
severity = "warning"

[rules.deps]
enabled = true
fail_on_cycles = true
severity = "error"

[rules.orphans]
enabled = false  # O(N) rg subprocess per symbol — hangs on codebases with 2000+ definitions
min_confidence = "high"
severity = "warning"

[rules.class]
enabled = true
coupling_threshold = 8
inheritance_depth_threshold = 4
inheritance_children_threshold = 10
severity = "error"
